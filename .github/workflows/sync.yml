name: Scheduled News Sync

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  sync-news:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Ingestion API
        run: |
          curl -X POST https://marketlens-qhfe.onrender.com/api/v1/fetch-news
